<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
    }
    .header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e0c97f;
    }
    .content { padding: 16px; }

    /* Settings */
    .settings { margin-bottom: 16px; }
    .settings label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
    .settings input {
      width: 100%;
      padding: 6px 8px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
    }
    .settings input:focus { outline: none; border-color: #e0c97f; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .btn-primary { background: #e0c97f; color: #1a1a2e; }
    .btn-primary:hover { background: #d4b96a; }
    .btn-secondary { background: #0f3460; color: #e0e0e0; }
    .btn-secondary:hover { background: #1a4a7a; }
    .btn-danger { background: #533; color: #f88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Metadata preview */
    .preview { margin-top: 12px; }
    .preview-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .meta-row {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .meta-label { color: #888; min-width: 60px; }
    .meta-value { color: #ccc; word-break: break-all; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 12px 0;
      font-size: 12px;
    }
    .checkbox-row input { accent-color: #e0c97f; }

    /* Status messages */
    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.success { display: block; background: #1a3a1a; color: #8f8; border: 1px solid #2a5a2a; }
    .status.error { display: block; background: #3a1a1a; color: #f88; border: 1px solid #5a2a2a; }
    .status.info { display: block; background: #1a2a3a; color: #8bf; border: 1px solid #2a3a5a; }

    .divider { border-top: 1px solid #0f3460; margin: 12px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Papers Manager</h1>
  </div>

  <div class="content">
    <!-- Server Settings -->
    <div class="settings">
      <label>Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:8000">
      <div class="btn-row">
        <button class="btn btn-secondary" id="btnTest">Test Connection</button>
        <button class="btn btn-secondary" id="btnSaveSettings">Save</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Extract button -->
    <button class="btn btn-secondary" id="btnExtract" style="width:100%">Extract from Current Page</button>

    <!-- Metadata Preview -->
    <div id="previewSection" style="display:none">
      <div class="preview">
        <div class="preview-title" id="previewTitle"></div>
        <div class="meta-row"><span class="meta-label">Authors</span><span class="meta-value" id="previewAuthors"></span></div>
        <div class="meta-row"><span class="meta-label">Year</span><span class="meta-value" id="previewYear"></span></div>
        <div class="meta-row"><span class="meta-label">Journal</span><span class="meta-value" id="previewJournal"></span></div>
        <div class="meta-row"><span class="meta-label">DOI</span><span class="meta-value" id="previewDoi"></span></div>
        <div class="meta-row"><span class="meta-label">arXiv</span><span class="meta-value" id="previewArxiv"></span></div>
        <div class="meta-row"><span class="meta-label">Source</span><span class="meta-value" id="previewSource"></span></div>
      </div>

      <div class="checkbox-row" id="pdfCheckboxRow">
        <input type="checkbox" id="fetchPdf" checked>
        <label for="fetchPdf">Also save PDF (if available)</label>
      </div>

      <button class="btn btn-primary" id="btnSave" style="width:100%">Save Paper</button>
    </div>

    <div id="statusMsg" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
