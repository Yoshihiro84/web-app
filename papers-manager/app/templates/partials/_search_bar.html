<form action="/papers" method="get" class="flex gap-2 mb-6">
  <input type="text" name="q" value="{{ q or '' }}" placeholder="Search papers by title, author, abstract..."
    class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
  <select name="status" class="px-3 py-2 border border-gray-300 rounded-md">
    <option value="">All Status</option>
    <option value="unread" {% if status == 'unread' %}selected{% endif %}>Unread</option>
    <option value="reading" {% if status == 'reading' %}selected{% endif %}>Reading</option>
    <option value="done" {% if status == 'done' %}selected{% endif %}>Done</option>
  </select>
  <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Search</button>
</form>
