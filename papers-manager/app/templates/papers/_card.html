<div class="bg-white rounded-lg shadow p-5 hover:shadow-md transition-shadow">
  <div class="flex justify-between items-start">
    <div class="flex-1">
      <a href="/papers/{{ paper.id }}" class="text-lg font-semibold text-blue-700 hover:underline">{{ paper.title }}</a>
      {% if paper.authors %}
      <p class="text-sm text-gray-600 mt-1">{{ paper.authors }}</p>
      {% endif %}
      <div class="flex items-center gap-3 mt-2 text-sm text-gray-500">
        {% if paper.year %}<span>{{ paper.year }}</span>{% endif %}
        {% if paper.journal %}<span>{{ paper.journal }}</span>{% endif %}
      </div>
    </div>
    <span class="ml-4 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
      {% if paper.status == 'done' %}bg-green-100 text-green-800
      {% elif paper.status == 'reading' %}bg-yellow-100 text-yellow-800
      {% else %}bg-gray-100 text-gray-800{% endif %}">
      {{ paper.status }}
    </span>
  </div>
  {% if paper.tags %}
  <div class="mt-3 flex flex-wrap gap-1">
    {% for tag in paper.tags %}
    <a href="/papers?tag_id={{ tag.id }}" class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-50 text-blue-700 hover:bg-blue-100">{{ tag.name }}</a>
    {% endfor %}
  </div>
  {% endif %}
</div>
